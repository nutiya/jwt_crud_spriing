spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/student_db_local
    username: user
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

app:
  jwt:
    secret: YOUR_JWT_SECRET
    expiration: 15m
    refresh-expiration: 30d